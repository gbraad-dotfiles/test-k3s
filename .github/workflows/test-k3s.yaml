name: Run Fedora using K3s

on:
  workflow_dispatch:
  pull_request:

jobs:
  fedora:
    runs-on: ubuntu-24.04
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Remove unwanted stuff
      if: ${{ inputs.cleanup  }}
      uses: gbraad-actions/remove-unwanted@v1


    - name: Get last 3 chars of hostname
      id: runner_id
      run: |
        echo "last3=${HOSTNAME: -3}" >> $GITHUB_OUTPUT

    - name: Tailscale
      uses: gbraad-actions/tailscale-action@v1
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
        args: --ssh --accept-dns=false --operator=runner --advertise-exit-node
        hostname: "dotfiles-${{ steps.runner_id.outputs.last3 }}"

    - name: Create and share userdirs
      run: |
        cd ${{ github.workspace }}
        mkdir -p Projects Documents Downloads
        ln -s ${{ github.workspace }}/Projects  ${HOME}/Projects
        ln -s ${{ github.workspace }}/Documents ${HOME}/Documents
        ln -s ${{ github.workspace }}/Downloads ${HOME}/Downloads
        tailscale drive share projects ${HOME}/Projects
        tailscale drive share documents ${HOME}/Documents
        tailscale drive share downloads ${HOME}/Downloads

    - name: Dotfiles (install from action)
      uses: gbraad-dotfiles/install-action@main
      with:
        upstream: true

    - name: Install K3s
      uses: gbraad-dotfiles/app-action@main
      with:
        appname: k3s
        action: install

    - name: Enable systemd pods
      uses: gbraad-dotfiles/app-action@main
      with:
        appname: k3s
        action: systempods enable

    - name: User kubeconfig
      uses: gbraad-dotfiles/app-action@main
      with:
        appname: k3s
        action: kubeconfig user

    - name: Run fedora container
      uses: gbraad-actions/zsh-action@main
      with:
        run: |
          source ~/.dotfiles/source.sh
          dev3s dotfedora deploy

    - name: Wait a little
      run: |
        sleep 60

    - name: Check fedora container
      uses: gbraad-actions/zsh-action@main
      with:
        run: |
          kubectl get pods

    - name: Hang around
      if: failure()
      run: |
        IP=`tailscale ip -4`
        echo "Use the following command to connect \`tailscale ssh runner@${IP}\` or \`rscreen runner@${IP}\`"
        sleep 18000
